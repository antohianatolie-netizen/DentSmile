<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Programare | DentSmile</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@1/css/pico.min.css">
    <link rel="stylesheet" href="../Css/style.css">
</head>
<body>
<header class="topbar">
    <div class="container topbar-inner">
        <div class="brand">
            <a href="../index.html" class="logo">
                <img src="../images/Logo-site-(2).png" alt="DentSmile logo">
            </a>
        </div>
        <nav class="mainnav">
            <a href="../index.html">Home</a>
            <a href="Servicii.html">Servicii</a>
            <a href="Echipa.html">Echipa</a>
            <a href="Preturi.html">Prețuri</a>
        </nav>
    </div>
</header>
<main>
    <section class="page-hero container page-hero-image">
        <article class="pricing-hero-card">
            <div class="hero-copy">
                <h1>Programare online</h1>
                <p>Completează formularul pentru o programare rapidă în cabinetul nostru.</p>
            </div>
        </article>
    </section>
    <section class="container form-card">
        <form action="#" method="post">
            <div class="grid-2">
                <div class="field-group">
                    <label for="nume">Nume</label>
                    <input type="text" id="nume" name="nume" placeholder="Ion" required minlength="2">
                </div>
                <div class="field-group">
                    <label for="prenume">Prenume</label>
                    <input type="text" id="prenume" name="prenume" placeholder="Popescu" required minlength="2">
                </div>
            </div>
            <div class="grid-2">
                <div class="field-group">
                    <label for="telefon">Telefon</label>
                    <input type="tel" id="telefon" name="telefon" placeholder="0720 123 456" pattern="[0-9\s+()-]{7,20}" required>
                </div>
                <div class="field-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="ion@example.com" required>
                </div>
            </div>
            <div class="grid-2">
                <div class="field-group">
                    <label for="data">Data programării</label>
                    <input type="date" id="data" name="data" required>
                </div>
                <div class="field-group">
                    <label for="procedura">Serviciu dorit</label>
                    <select id="procedura" name="procedura" required>
                        <option value="">Alege un serviciu</option>
                        <option value="consultatie">Consultație</option>
                        <option value="igienizare">Igienizare dentară</option>
                        <option value="albire">Albire dentară</option>
                        <option value="ortodontie">Ortodonție</option>
                        <option value="implantologie">Implantologie</option>
                    </select>
                </div>
            </div>
            <label for="mesaj">Mesaj</label>
            <textarea id="mesaj" name="mesaj" rows="4" placeholder="Mesajul tău..."></textarea>
            <div class="form-actions">
                <button type="submit" class="btn-primary form-submit-btn">Trimite</button>
            </div>
            <p class="form-phone-note">Telefon: +373 600 00 000</p>
        </form>
    </section>
</main>
<footer class="site-footer" style="padding: 0.25rem 0 0.35rem;">
    <div class="container footer-links" style="gap: 0.15rem;">
        <a href="../index.html" style="font-size: 0.75rem; line-height: 1.05;">Acasă</a>
        <a href="Servicii.html" style="font-size: 0.75rem; line-height: 1.05;">Servicii</a>
        <a href="Preturi.html" style="font-size: 0.75rem; line-height: 1.05;">Prețuri</a>
        <a href="Programare.html" style="font-size: 0.75rem; line-height: 1.05;">Programare</a>
    </div>
</footer>
<script src="../Javascript/script.js"></script>
</body>
</html>
